# Label catalog for the noy-db repo.
# Apply with: bash scripts/sync-labels.sh

# Type
- name: "type: bug"
  color: "d73a4a"
  description: "A defect in NOYDB"
- name: "type: feature"
  color: "0e8a16"
  description: "A new feature or enhancement"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type: chore"
  color: "fef2c0"
  description: "Tooling, CI, build, refactor with no behavior change"
- name: "type: security"
  color: "b60205"
  description: "Security-relevant work (review with extra care)"

# Priority
- name: "priority: high"
  color: "b60205"
  description: "Blocks the current release"
- name: "priority: medium"
  color: "fbca04"
  description: "Should land in the current release"
- name: "priority: low"
  color: "c2e0c6"
  description: "Nice to have"

# Release
- name: "release: v0.3"
  color: "5319e7"
  description: "Targets the v0.3 release"
- name: "release: v0.4"
  color: "5319e7"
  description: "Targets the v0.4 release"
- name: "release: v1.0"
  color: "5319e7"
  description: "Targets the v1.0 LTS release"

# Area — codebase scope
- name: "area: core"
  color: "1d76db"
  description: "@noy-db/core"
- name: "area: pinia"
  color: "1d76db"
  description: "@noy-db/pinia"
- name: "area: nuxt"
  color: "1d76db"
  description: "@noy-db/nuxt"
- name: "area: vue"
  color: "1d76db"
  description: "@noy-db/vue"
- name: "area: scaffolder"
  color: "1d76db"
  description: "create-noy-db"
- name: "area: adapters"
  color: "1d76db"
  description: "Any adapter package (file, browser, dynamo, s3, memory)"
- name: "area: docs"
  color: "1d76db"
  description: "ROADMAP, docs/*, README"
- name: "area: ci"
  color: "1d76db"
  description: ".github/workflows, scripts, release pipeline"

# Status
- name: "epic"
  color: "8b5cf6"
  description: "Tracking issue for a release or multi-PR initiative"
- name: "needs triage"
  color: "ededed"
  description: "Awaiting maintainer review"
- name: "blocked"
  color: "e11d48"
  description: "Cannot proceed until something else lands"
- name: "good first issue"
  color: "7057ff"
  description: "A well-scoped task suitable for new contributors"
- name: "help wanted"
  color: "008672"
  description: "Maintainers welcome external contributions on this"
- name: "wontfix"
  color: "ffffff"
  description: "Closed without action"
- name: "duplicate"
  color: "cccccc"
  description: "Already tracked elsewhere"
